<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PulsoHoy — Noticias verificadas</title>
  <meta name="description" content="Noticias del día calificadas por veracidad, con gráficas financieras y diseño moderno.">
  
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1346198069090338"
     crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Estilos externos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">Pulso<span>Hoy</span></div>
    <div class="nav-links">
      <button class="nav-btn active" data-section="noticias">Noticias</button>
      <button class="nav-btn" data-section="escribir">✍ Escribir</button>
      <button class="dark-toggle" id="darkToggle">🌙</button>
    </div>
  </div>
</header>

<!-- Banner superior AdSense -->
<div class="ad-top">
  <ins class="adsbygoogle desktop-ad"
       style="display:inline-block;width:728px;height:90px"
       data-ad-client="ca-pub-1346198069090338"
       data-ad-slot="XXXXXXXXXX"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  
  <ins class="adsbygoogle mobile-ad"
       style="display:inline-block;width:320px;height:50px"
       data-ad-client="ca-pub-1346198069090338"
       data-ad-slot="YYYYYYYYYY"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="container">
  <div class="filters" id="filterContainer">
    <button class="filter-chip active" data-filter="todos">Todas</button>
    <button class="filter-chip" data-filter="economia">Economía</button>
    <button class="filter-chip" data-filter="politica">Política</button>
    <button class="filter-chip" data-filter="tecnologia">Tecnología</button>
    <button class="filter-chip" data-filter="mundo">Mundo</button>
    <button class="filter-chip" data-filter="salud">Salud</button>
  </div>

  <div class="layout">
    <!-- Columna principal -->
    <div class="main-col">
      <div id="noticiasSection" class="section active">
        <div id="heroContainer"></div>
        <div class="section-header">
          <h2>Últimas noticias</h2>
          <span id="newsCount"></span>
        </div>
        <div id="newsGrid" class="news-grid"></div>
      </div>

      <div id="escribirSection" class="section" style="display:none;">
        <div class="write-form">
          <h3>Publicar nuevo artículo</h3>
          <div class="form-group"><input type="text" id="artTitle" placeholder="Título *"></div>
          <div class="form-group">
            <select id="artCategory">
              <option value="economia">Economía</option><option value="politica">Política</option>
              <option value="tecnologia">Tecnología</option><option value="mundo">Mundo</option>
              <option value="salud">Salud</option><option value="business">Negocios</option>
            </select>
          </div>
          <div class="form-group"><input type="text" id="artSource" placeholder="Fuente / Autor *"></div>
          <div class="form-group"><input type="url" id="artImageUrl" placeholder="URL de imagen (opcional)"></div>
          <div class="form-group"><input type="text" id="artExcerpt" placeholder="Resumen *"></div>
          <div class="form-group"><textarea id="artBody" rows="6" placeholder="Cuerpo del artículo *"></textarea></div>
          <div class="form-group">
            <label>¿Datos financieros?</label>
            <select id="artHasData"><option value="no">No</option><option value="yes">Sí</option></select>
          </div>
          <div id="finDataSection" style="display:none;">
            <textarea id="artFinData" placeholder='{"labels":["Ene","Feb"],"values":[100,150],"title":"Ventas","unit":"MXN"}'></textarea>
          </div>
          <button class="like-btn" style="background:var(--accent-red); color:white; margin-top:12px;" onclick="publishArticle()">Publicar</button>
        </div>
      </div>
    </div>

    <!-- Barra lateral -->
    <aside class="sidebar-col">
      <div class="sidebar-widget sidebar-ad">
        <ins class="adsbygoogle"
             style="display:inline-block;width:300px;height:250px"
             data-ad-client="ca-pub-1346198069090338"
             data-ad-slot="ZZZZZZZZZZ"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>

      <div class="sidebar-widget">
        <h3>Lo más leído</h3>
        <ul class="trending-list" id="trendingList"></ul>
      </div>

      <div class="sidebar-widget sidebar-ad">
        <ins class="adsbygoogle"
             style="display:inline-block;width:300px;height:600px"
             data-ad-client="ca-pub-1346198069090338"
             data-ad-slot="WWWWWWWWWW"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="articleModal">
  <div class="modal">
    <div id="modalContent"></div>
    <button onclick="closeModal()" style="margin-top:16px;">Cerrar</button>
  </div>
</div>

<script>
  // ---------- MOCK NEWS (fallback si no hay backend) ----------
  let allNews = [];
  let currentFilter = 'todos';
  let userToken = localStorage.getItem('userToken') || 'user_' + Math.random().toString(36).substr(2);
  let chartInstances = {};

  function generateMockNews() {
    return [
      { id:1, title:"Inflación en México baja al 4.2% en enero", category:"economia", source:"Banxico", excerpt:"Mejor dato en 18 meses, por debajo de expectativas.", body:"El INEGI reportó una disminución...", truth_score:94, truth_label:"Verificado", is_financial:true, chart_data:{ type:"line", labels:["Sep","Oct","Nov","Dic","Ene"], values:[4.45,4.26,4.32,4.66,4.20], unit:"%" }, image_url:"https://picsum.photos/id/20/400/250", created_at:new Date().toISOString() },
      { id:2, title:"Senado aprueba reforma de pensiones", category:"politica", source:"El Universal", excerpt:"Aumento gradual de cuotas patronales.", body:"La reforma fue aprobada...", truth_score:82, truth_label:"Verificado", is_financial:true, chart_data:{ type:"bar", labels:["2025","2026","2027"], values:[5.15,8.2,11.9], unit:"%" }, image_url:"https://picsum.photos/id/26/400/250", created_at:new Date().toISOString() },
      { id:3, title:"Dólar alcanza $18.50 pesos", category:"economia", source:"Bloomberg", excerpt:"Volatilidad por anuncios arancelarios.", body:"El peso se depreció 2.1%...", truth_score:76, truth_label:"Probable", is_financial:true, chart_data:{ type:"line", labels:["Lun","Mar","Mié","Jue","Vie"], values:[17.92,17.85,18.10,18.35,18.50], unit:"MXN" }, image_url:"https://picsum.photos/id/30/400/250", created_at:new Date().toISOString() },
      { id:4, title:"OpenAI presenta GPT-5 multimodal", category:"tecnologia", source:"TechCrunch", excerpt:"Razonamiento avanzado en texto e imagen.", body:"Nuevo modelo con cadena de pensamiento...", truth_score:88, truth_label:"Verificado", is_financial:false, image_url:"https://picsum.photos/id/0/400/250", created_at:new Date().toISOString() },
      { id:5, title:"Ley de vivienda en España", category:"politica", source:"El País", excerpt:"Congelación de alquileres en zonas tensionadas.", body:"El Consejo de Ministros aprobó...", truth_score:93, truth_label:"Verificado", is_financial:false, image_url:"https://picsum.photos/id/104/400/250", created_at:new Date().toISOString() },
      { id:6, title:"Tesla reduce precio del Model 3", category:"business", source:"Reuters", excerpt:"Baja de $749k a $636k MXN.", body:"Estrategia frente a BYD...", truth_score:85, truth_label:"Verificado", is_financial:true, chart_data:{ type:"bar", labels:["Tesla","BYD","Volvo"], values:[636,589,799], unit:"k MXN" }, image_url:"https://picsum.photos/id/107/400/250", created_at:new Date().toISOString() },
      { id:7, title:"Brote de dengue en Brasil", category:"salud", source:"Fiocruz", excerpt:"500 mil casos, emergencia en 5 estados.", body:"Serotipo DENV-3 circula...", truth_score:90, truth_label:"Verificado", is_financial:false, image_url:"https://picsum.photos/id/116/400/250", created_at:new Date().toISOString() }
    ];
  }

  async function loadNews() {
    try {
      const res = await fetch('/api/news');
      if (res.ok) {
        allNews = await res.json();
      } else throw new Error();
    } catch(e) {
      console.warn("Usando noticias de ejemplo (mock)");
      allNews = generateMockNews();
    }
    renderAll();
  }

  function renderAll() {
    renderHero(allNews);
    renderNewsGrid(allNews);
    renderTrending(allNews);
    document.getElementById('newsCount').innerText = `${allNews.length} noticias`;
  }

  function renderHero(news) {
    if (!news.length) return;
    const main = news[0];
    const subs = news.slice(1,3);
    const heroHtml = `
      <div class="hero-grid">
        <div class="hero-main" onclick="openArticle(${main.id})">
          <img class="hero-img" src="${main.image_url || 'https://picsum.photos/id/1/800/400'}" loading="lazy">
          <div class="hero-content">
            <div class="hero-category">${main.category.toUpperCase()}</div>
            <div class="hero-title">${main.title}</div>
            <div class="hero-excerpt">${main.excerpt}</div>
            <div class="hero-meta">
              <span>${main.source}</span>
              <span class="truth-badge">${main.truth_label} ${main.truth_score}%</span>
            </div>
          </div>
        </div>
        <div class="hero-sub">
          ${subs.map(s => `
            <div class="sub-card" onclick="openArticle(${s.id})">
              <img class="sub-img" src="${s.image_url || 'https://picsum.photos/id/20/200/200'}" loading="lazy">
              <div class="sub-content"><h4>${s.title}</h4><div class="hero-meta">${s.source}</div></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.getElementById('heroContainer').innerHTML = heroHtml;
  }

  function renderNewsGrid(news) {
    const filtered = currentFilter === 'todos' ? news : news.filter(n => n.category === currentFilter);
    const grid = document.getElementById('newsGrid');
    if (!filtered.length) { grid.innerHTML = '<p>No hay noticias en esta categoría.</p>'; return; }
    grid.innerHTML = filtered.map(item => `
      <div class="news-card" data-cat="${item.category}">
        <img class="news-card-img" src="${item.image_url || 'https://picsum.photos/id/100/400/250'}" loading="lazy" onclick="openArticle(${item.id})">
        <div class="news-card-body">
          <div class="news-category">${item.category}</div>
          <div class="news-card-title" onclick="openArticle(${item.id})">${item.title}</div>
          <div class="news-excerpt">${item.excerpt.substring(0,100)}...</div>
          ${item.is_financial ? `<div style="height:140px; margin:12px 0;"><canvas id="chart_${item.id}"></canvas></div>` : ''}
          <div class="card-footer">
            <span>${item.source}</span>
            <span class="truth-badge" style="background:#e6f7ec;">${item.truth_label} ${item.truth_score}%</span>
            <button class="like-btn" onclick="event.stopPropagation(); likeArticle(${item.id})">👍 <span id="likes_${item.id}">0</span></button>
            <button class="later-btn" onclick="event.stopPropagation(); saveLater(${item.id})">🔖</button>
            <button class="share-btn" onclick="event.stopPropagation(); shareArticle(${item.id})">📤</button>
          </div>
        </div>
      </div>
    `).join('');
    filtered.forEach(item => {
      if (item.is_financial && item.chart_data) {
        setTimeout(() => initChart(item), 50);
      }
      fetchLikes(item.id);
    });
  }

  function initChart(item) {
    const canvas = document.getElementById(`chart_${item.id}`);
    if (!canvas || chartInstances[canvas.id]) return;
    const cd = item.chart_data;
    chartInstances[canvas.id] = new Chart(canvas, {
      type: cd.type === 'line' ? 'line' : 'bar',
      data: { labels: cd.labels, datasets: [{ label: cd.unit, data: cd.values, backgroundColor: '#dc2626' }] },
      options: { responsive: true, maintainAspectRatio: true }
    });
  }

  async function fetchLikes(id) {
    try {
      const res = await fetch(`/api/likes/${id}`);
      const data = await res.json();
      document.getElementById(`likes_${id}`).innerText = data.count;
    } catch(e) {}
  }
  async function likeArticle(id) {
    await fetch('/api/like', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ news_id:id, user_token:userToken }) });
    fetchLikes(id);
  }
  function saveLater(id) { alert("Guardado localmente (demo)"); }
  function shareArticle(item) { navigator.share ? navigator.share({title:item.title}) : alert("Copia el enlace"); }

  function openArticle(id) {
    const article = allNews.find(a => a.id === id);
    if (!article) return;
    const modal = document.getElementById('articleModal');
    document.getElementById('modalContent').innerHTML = `
      <img src="${article.image_url}" style="width:100%; border-radius:12px; margin-bottom:16px;">
      <h2>${article.title}</h2>
      <p><strong>${article.source}</strong> · Veracidad: ${article.truth_label} ${article.truth_score}%</p>
      <div>${article.body || article.excerpt}</div>
      ${article.is_financial && article.chart_data ? `<canvas id="modalChart" style="height:200px; margin:16px 0;"></canvas>` : ''}
    `;
    if (article.is_financial && article.chart_data) {
      setTimeout(() => {
        const canvas = document.getElementById('modalChart');
        if(canvas) new Chart(canvas, { type: article.chart_data.type, data: { labels: article.chart_data.labels, datasets: [{ data: article.chart_data.values, backgroundColor:'#dc2626' }] } });
      }, 100);
    }
    modal.classList.add('open');
  }
  function closeModal() { document.getElementById('articleModal').classList.remove('open'); }

  function setupFilters() {
    const filterBtns = document.querySelectorAll('.filter-chip');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderNewsGrid(allNews);
      });
    });
  }

  window.publishArticle = function() {
    const title = document.getElementById('artTitle').value;
    if(!title) return alert("Completa título");
    const newArticle = {
      id: Date.now(),
      title: title,
      category: document.getElementById('artCategory').value,
      source: document.getElementById('artSource').value,
      excerpt: document.getElementById('artExcerpt').value,
      body: document.getElementById('artBody').value,
      image_url: document.getElementById('artImageUrl').value || 'https://picsum.photos/id/42/400/250',
      is_financial: document.getElementById('artHasData').value === 'yes',
      chart_data: document.getElementById('artHasData').value === 'yes' ? JSON.parse(document.getElementById('artFinData').value || '{}') : null,
      truth_score: 85,
      truth_label: "Verificado",
      created_at: new Date().toISOString()
    };
    allNews.unshift(newArticle);
    renderAll();
    alert("Artículo publicado (demo local)");
  };

  function initNavigation() {
    const navBtns = document.querySelectorAll('.nav-btn');
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.getAttribute('data-section');
        document.getElementById('noticiasSection').style.display = section === 'noticias' ? 'block' : 'none';
        document.getElementById('escribirSection').style.display = section === 'escribir' ? 'block' : 'none';
        navBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(section === 'escribir') document.getElementById('escribirSection').style.display = 'block';
      });
    });
  }

  // Modo oscuro
  document.getElementById('darkToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
  });
  if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

  function renderTrending(news) {
    const trendingList = document.getElementById('trendingList');
    if(trendingList) {
      trendingList.innerHTML = news.slice(0,5).map((n,i)=>`<li onclick="openArticle(${n.id})"><div class="trend-num">${i+1}</div><div>${n.title}</div></li>`).join('');
    }
  }

  loadNews();
  setupFilters();
  initNavigation();
</script>
</body>
</html>
