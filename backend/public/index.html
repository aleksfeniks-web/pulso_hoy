<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulsoHoy — Noticias del Día</title>
<meta name="description" content="Noticias verificadas con gráficas financieras, imágenes y base de datos en la nube.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  /* ========== VARIABLES Y ESTILOS BASE ========== */
  :root {
    --ink: #1a1208;
    --ink-2: #3d3324;
    --ink-3: #6b5d4a;
    --ink-4: #a8987e;
    --paper: #faf7f2;
    --paper-2: #f2ede3;
    --paper-3: #e8e0d0;
    --accent: #c0392b;
    --accent-2: #e74c3c;
    --gold: #b8860b;
    --border: #d4c9b0;
    --border-2: #e8e0d0;
    --sidebar-w: 300px;
    --header-h: 72px;
    --radius: 8px;
    --transition: all 0.2s ease;
  }
  body.dark-mode {
    --ink: #f0f0f0;
    --ink-2: #ccc;
    --ink-3: #aaa;
    --ink-4: #888;
    --paper: #121212;
    --paper-2: #1e1e1e;
    --paper-3: #2d2d2d;
    --border: #333;
    --border-2: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    transition: var(--transition);
  }
  /* ========== HEADER ========== */
  header {
    background: var(--ink);
    color: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent-2); }
  .date-strip {
    font-size: 11px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-left: 24px;
    border-left: 1px solid rgba(255,255,255,0.15);
  }
  .nav-tabs {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }
  .nav-tab, .dark-toggle {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--paper-3);
    background: transparent;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
  }
  .nav-tab:hover, .dark-toggle:hover { background: rgba(255,255,255,0.1); color: white; }
  .nav-tab.active, .dark-toggle.active { background: var(--accent); color: white; }
  /* ========== ADS (placeholder) ========== */
  .ad-leaderboard {
    background: var(--paper-2);
    border-bottom: 1px solid var(--border-2);
    text-align: center;
    padding: 10px;
  }
  .ad-placeholder {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--paper-3);
    border: 1px dashed var(--border);
    color: var(--ink-4);
    font-size: 11px;
    text-transform: uppercase;
    border-radius: var(--radius);
  }
  .ad-728x90 { width: 728px; max-width: 100%; height: 90px; }
  .ad-300x250 { width: 300px; height: 250px; }
  .ad-300x600 { width: 300px; height: 600px; }
  .ad-320x50 { width: 320px; max-width: 100%; height: 50px; display: none; }
  /* ========== TICKER ========== */
  .ticker-bar {
    background: var(--accent);
    color: white;
    padding: 8px 0;
    overflow: hidden;
    font-size: 13px;
    font-weight: 500;
  }
  .ticker-inner {
    display: flex;
    white-space: nowrap;
    animation: ticker 40s linear infinite;
  }
  .ticker-label {
    background: var(--ink);
    padding: 0 16px;
    margin-right: 24px;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  /* ========== LAYOUT ========== */
  .layout {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 24px 48px;
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    gap: 32px;
  }
  .main-col { min-width: 0; }
  .side-col { min-width: 0; }
  .section { display: none; }
  .section.active { display: block; }
  /* ========== HERO ========== */
  .hero-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .hero-card {
    background: var(--paper);
    padding: 24px;
    cursor: pointer;
    transition: var(--transition);
  }
  .hero-card:hover { background: var(--paper-2); }
  .hero-main { grid-row: 1 / 3; }
  .hero-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 16px;
  }
  .hero-sub .hero-img { height: 100px; margin-bottom: 12px; }
  .hero-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .hero-sub .hero-title { font-size: 17px; }
  .hero-excerpt {
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    color: var(--ink-2);
    line-height: 1.65;
    margin-bottom: 16px;
  }
  /* ========== NEWS LIST ========== */
  .news-list { display: flex; flex-direction: column; gap: 0; }
  .news-item {
    padding: 20px 0;
    border-bottom: 1px solid var(--border-2);
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 20px;
  }
  .news-img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: var(--radius);
  }
  .news-cat {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .cat-economy { color: var(--gold); }
  .cat-politics { color: var(--accent); }
  .cat-tech { color: #1565c0; }
  .cat-world { color: #1b5e20; }
  .cat-health { color: #6a1b9a; }
  .cat-business { color: #e65100; }
  .news-title {
    font-family: 'Source Serif 4', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .news-title:hover { color: var(--accent); }
  .news-excerpt { font-size: 13px; color: var(--ink-3); margin-bottom: 10px; }
  .news-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .like-btn, .later-btn, .share-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: var(--transition);
    color: var(--ink-2);
  }
  .like-btn:hover, .later-btn:hover, .share-btn:hover { background: var(--paper-2); border-color: var(--accent); }
  /* ========== TRUTH SCORE ========== */
  .truth-score {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .ts-verified { background: #e8f5ee; color: #1a6b3a; }
  .ts-likely { background: #e8f0fe; color: #1a56b0; }
  .ts-mixed { background: #fff8e1; color: #8a6200; }
  .ts-disputed { background: #fdecea; color: #8b1a1a; }
  .ts-bar {
    height: 3px;
    background: var(--border-2);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
    width: 120px;
  }
  .ts-fill { height: 100%; border-radius: 2px; }
  /* ========== MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--paper);
    border-radius: var(--radius);
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 20px;
  }
  /* ========== FORMULARIO ========== */
  .write-container {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink-3);
    display: block;
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .btn-publish, .btn-draft {
    padding: 10px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 600;
    border: none;
  }
  .btn-publish { background: var(--accent); color: white; }
  .btn-draft { background: var(--paper-2); border: 1px solid var(--border); }
  /* ========== SIDEBAR ========== */
  .subscribe-box {
    background: var(--ink);
    color: var(--paper);
    padding: 24px;
    border-radius: var(--radius);
  }
  .sub-plans {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0;
  }
  .sub-plan {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    text-align: center;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .sub-plan.selected { border: 1px solid var(--accent-2); }
  .btn-subscribe {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .trending-list { list-style: none; }
  .trending-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border-2);
    display: flex;
    gap: 12px;
    cursor: pointer;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .side-col { display: none; }
    .hero-grid { grid-template-columns: 1fr; }
    .news-item { grid-template-columns: 80px 1fr; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Pulso<span>Hoy</span></div>
    <div class="date-strip" id="dateStrip"></div>
    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="showSection('noticias')">Noticias</button>
      <button class="nav-tab" onclick="showSection('escribir')">✍ Escribir</button>
      <button class="dark-toggle" id="darkModeToggle">🌙</button>
    </nav>
  </div>
</header>

<div class="ad-leaderboard">
  <div class="ad-placeholder ad-728x90">📢 Anuncio 728×90</div>
  <div class="ad-placeholder ad-320x50">📢 Anuncio 320×50</div>
</div>

<div class="ticker-bar">
  <div class="ticker-inner" id="tickerText">
    <span class="ticker-label">EN VIVO</span>
    <span id="tickerContent">Cargando...</span>
  </div>
</div>

<div class="layout">
  <main class="main-col">
    <section class="section active" id="sec-noticias">
      <div id="newsContent">
        <div class="hero-grid" id="heroGrid"></div>
        <div class="filter-bar" style="display: flex; gap: 8px; margin-bottom: 20px;">
          <button class="filter-chip active" onclick="filterNews('todos',this)">Todas</button>
          <button class="filter-chip" onclick="filterNews('economia',this)">Economía</button>
          <button class="filter-chip" onclick="filterNews('politica',this)">Política</button>
          <button class="filter-chip" onclick="filterNews('tecnologia',this)">Tecnología</button>
          <button class="filter-chip" onclick="filterNews('mundo',this)">Mundo</button>
          <button class="filter-chip" onclick="filterNews('salud',this)">Salud</button>
        </div>
        <div class="section-header">
          <h2 class="section-title">Noticias del Día</h2>
          <span class="section-count" id="newsCount"></span>
        </div>
        <div class="news-list" id="newsList"></div>
      </div>
    </section>

    <section class="section" id="sec-escribir">
      <div class="section-header"><h2 class="section-title">Publicar Artículo</h2></div>
      <div class="write-container">
        <div class="form-group">
          <label class="form-label">Titular *</label>
          <input type="text" class="form-input" id="artTitle">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Categoría *</label>
            <select class="form-select" id="artCategory">
              <option value="economia">Economía</option><option value="politica">Política</option>
              <option value="tecnologia">Tecnología</option><option value="mundo">Mundo</option>
              <option value="salud">Salud</option><option value="business">Negocios</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fuente *</label>
            <input type="text" class="form-input" id="artSource">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">URL de la imagen (opcional)</label>
          <input type="url" class="form-input" id="artImageUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">Resumen *</label>
          <input type="text" class="form-input" id="artExcerpt">
        </div>
        <div class="form-group">
          <label class="form-label">Cuerpo *</label>
          <textarea class="form-textarea" id="artBody" rows="6"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">URL fuente</label>
            <input type="url" class="form-input" id="artUrl">
          </div>
          <div class="form-group">
            <label class="form-label">¿Datos financieros?</label>
            <select class="form-select" id="artHasData">
              <option value="no">No</option><option value="yes">Sí</option>
            </select>
          </div>
        </div>
        <div id="finDataSection" style="display:none;">
          <div class="form-group">
            <label class="form-label">JSON de gráfica</label>
            <textarea class="form-textarea" id="artFinData" placeholder='{"labels":["Ene","Feb"],"values":[100,150],"title":"Ventas","unit":"MXN"}'></textarea>
          </div>
        </div>
        <div class="write-actions" style="display: flex; gap: 12px; justify-content: flex-end;">
          <button class="btn-draft" onclick="saveArticle('draft')">Borrador</button>
          <button class="btn-publish" onclick="saveArticle('published')">Publicar</button>
        </div>
      </div>
      <div class="my-articles" style="margin-top: 32px;">
        <div class="section-header"><h2 class="section-title">Mis Artículos</h2></div>
        <div id="myArticlesList">No has escrito artículos aún.</div>
      </div>
    </section>
  </main>

  <aside class="side-col">
    <div class="sidebar-widget">
      <div class="subscribe-box">
        <h3>Suscríbete</h3>
        <p>Noticias verificadas en tu correo.</p>
        <div class="sub-plans">
          <div class="sub-plan" onclick="selectPlan(this,'gratis')">Gratis $0</div>
          <div class="sub-plan selected" onclick="selectPlan(this,'pro')">Pro $4.99</div>
        </div>
        <input type="text" id="subName" placeholder="Nombre" style="width:100%; margin-bottom:8px; padding:8px;">
        <input type="email" id="subEmail" placeholder="Email" style="width:100%; margin-bottom:12px; padding:8px;">
        <button class="btn-subscribe" onclick="doSubscribe()">Suscribirme →</button>
      </div>
    </div>
    <div class="sidebar-widget"><div class="ad-placeholder ad-300x250">📢 Anuncio 300x250</div></div>
    <div class="sidebar-widget"><h3 class="widget-title">Lo Más Leído</h3><ul class="trending-list" id="trendingList"></ul></div>
    <div class="sidebar-widget"><div class="ad-placeholder ad-300x600">📢 Anuncio 300x600</div></div>
  </aside>
</div>

<div class="modal-overlay" id="articleModal" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div style="padding:20px;">
      <div class="hero-tag" id="modalCat"></div>
      <h2 id="modalTitle" style="font-family:'Playfair Display'"></h2>
      <img class="modal-img" id="modalImg" alt="">
      <div id="modalBody"></div>
      <div style="margin-top:20px; text-align:right;">
        <button class="like-btn" id="modalLikeBtn">👍 Me gusta</button>
        <button class="share-btn" id="modalShareBtn">📤 Compartir</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ========== CONFIGURACIÓN ==========
const API_BASE = window.location.origin; // Mismo origen, porque el backend sirve el frontend
let allNews = [];
let currentFilter = 'todos';
let myArticles = JSON.parse(localStorage.getItem('myArticles') || '[]');
let selectedPlan = 'pro';
let userToken = localStorage.getItem('userToken');
if (!userToken) {
  userToken = 'user_' + Math.random().toString(36).substring(2) + Date.now();
  localStorage.setItem('userToken', userToken);
}
let chartInstances = {};

// ========== FUNCIONES AUXILIARES ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function getTruthClass(score) {
  if (score >= 80) return 'ts-verified';
  if (score >= 65) return 'ts-likely';
  if (score >= 45) return 'ts-mixed';
  return 'ts-disputed';
}

function getCatLabel(cat) {
  const map = { economia:'Economía', politica:'Política', tecnologia:'Tecnología', mundo:'Mundo', salud:'Salud', business:'Negocios' };
  return map[cat] || cat;
}

function getCatClass(cat) {
  const map = { economia:'cat-economy', politica:'cat-politics', tecnologia:'cat-tech', mundo:'cat-world', salud:'cat-health', business:'cat-business' };
  return map[cat] || '';
}

function timeAgo(dateStr) {
  const diff = Math.floor((new Date() - new Date(dateStr)) / 60000);
  if (diff < 60) return `Hace ${diff} min`;
  return `Hace ${Math.floor(diff/60)}h`;
}

// ========== CARGAR NOTICIAS DESDE LA API ==========
async function fetchNews() {
  try {
    const res = await fetch(`${API_BASE}/api/news`);
    allNews = await res.json();
    if (allNews.length === 0) {
      // Si no hay noticias, insertar algunas de ejemplo
      await seedExampleNews();
      const res2 = await fetch(`${API_BASE}/api/news`);
      allNews = await res2.json();
    }
    renderHero(allNews);
    renderNewsList(allNews);
    renderTrending(allNews);
    renderTicker(allNews);
    document.getElementById('newsCount').textContent = `${allNews.length} noticias`;
  } catch (err) {
    console.error(err);
    showToast('Error al cargar noticias');
  }
}

async function seedExampleNews() {
  const example = [
    { title: "Inflación baja al 4.2% en México", category: "economia", source: "Banxico", excerpt: "Mejor dato en 18 meses", body: "El INEGI reportó...", is_financial: true, chart_data: { type:"line", labels:["Jul","Ago","Sep"], values:[5.0,4.7,4.2], unit:"%" }, image_url: "https://picsum.photos/400/200?random=1" },
    { title: "Tesla reduce precios un 15%", category: "business", source: "Reuters", excerpt: "Model 3 ahora cuesta $636k MXN", body: "Competencia eléctrica...", is_financial: true, chart_data: { type:"bar", labels:["Tesla","BYD","Volvo"], values:[636,589,799], unit:"k MXN" }, image_url: "https://picsum.photos/400/200?random=2" }
  ];
  for (let art of example) {
    await fetch(`${API_BASE}/api/news`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...art, source_url: "#", user_email: "system@example.com" })
    });
  }
}

// ========== RENDERIZADO ==========
function renderHero(news) {
  const heroGrid = document.getElementById('heroGrid');
  if (!news.length) return;
  const main = news[0];
  const subs = news.slice(1,3);
  heroGrid.innerHTML = `
    <div class="hero-card hero-main" onclick="openArticle(${main.id})">
      <img class="hero-img" src="${main.image_url || 'https://picsum.photos/400/200'}" loading="lazy" alt="${main.title}">
      <div class="hero-tag">${getCatLabel(main.category)}</div>
      <h1 class="hero-title">${main.title}</h1>
      <p class="hero-excerpt">${main.excerpt.substring(0,140)}...</p>
      <div class="meta-row"><span class="source-badge">${main.source}</span><span class="time-ago">${timeAgo(main.created_at)}</span><span class="truth-score ${getTruthClass(main.truth_score)}">${main.truth_label} ${main.truth_score}%</span></div>
      <div class="ts-bar"><div class="ts-fill" style="width:${main.truth_score}%; background:${main.truth_score>=80?'#1a6b3a':'#daa520'}"></div></div>
    </div>
    ${subs.map(n => `<div class="hero-card hero-sub" onclick="openArticle(${n.id})">
      <img class="hero-img" src="${n.image_url || 'https://picsum.photos/200/100'}" loading="lazy" alt="${n.title}">
      <div class="hero-tag">${getCatLabel(n.category)}</div>
      <h2 class="hero-title">${n.title}</h2>
      <p class="hero-excerpt">${n.excerpt.substring(0,90)}...</p>
    </div>`).join('')}
  `;
}

function renderNewsList(news) {
  const list = document.getElementById('newsList');
  const rest = news.slice(3);
  if (rest.length === 0) { list.innerHTML = '<p>No hay más noticias</p>'; return; }
  list.innerHTML = rest.map(item => `
    <div class="news-item" data-cat="${item.category}">
      <img class="news-img" src="${item.image_url || 'https://picsum.photos/100/80'}" loading="lazy" alt="${item.title}">
      <div>
        <div class="news-cat ${getCatClass(item.category)}">${getCatLabel(item.category)}</div>
        <h3 class="news-title" onclick="openArticle(${item.id})">${item.title}</h3>
        <p class="news-excerpt">${item.excerpt}</p>
        ${item.is_financial ? `<div style="height:150px; margin:10px 0;"><canvas id="chart_list_${item.id}"></canvas></div>` : ''}
        <div class="news-footer">
          <span>${item.source}</span>
          <span class="truth-score ${getTruthClass(item.truth_score)}">${item.truth_label} ${item.truth_score}%</span>
          <button class="like-btn" onclick="likeArticle(${item.id})">👍 <span id="likes_${item.id}">0</span></button>
          <button class="later-btn" onclick="saveForLater(${item.id})">🔖 Leer después</button>
          <button class="share-btn" onclick="shareArticle(${item.id})">📤 Compartir</button>
        </div>
      </div>
    </div>
  `).join('');
  // Cargar contadores de likes y gráficas
  rest.forEach(item => {
    fetch(`${API_BASE}/api/likes/${item.id}`).then(r=>r.json()).then(data => {
      document.getElementById(`likes_${item.id}`).innerText = data.count;
    });
    if (item.is_financial && item.chart_data) {
      setTimeout(() => initChart(item, 'list'), 50);
    }
  });
}

function initChart(item, prefix) {
  const canvas = document.getElementById(`chart_${prefix}_${item.id}`);
  if (!canvas || !item.chart_data) return;
  const cd = item.chart_data;
  const ctx = canvas.getContext('2d');
  if (chartInstances[canvas.id]) chartInstances[canvas.id].destroy();
  chartInstances[canvas.id] = new Chart(ctx, {
    type: cd.type === 'line' ? 'line' : 'bar',
    data: { labels: cd.labels, datasets: [{ label: cd.unit, data: cd.values, backgroundColor: '#c0392b' }] },
    options: { responsive: true, maintainAspectRatio: true }
  });
}

function renderTrending(news) {
  const trending = document.getElementById('trendingList');
  trending.innerHTML = news.slice(0,5).map((n,i) => `<li onclick="openArticle(${n.id})"><div class="trend-num">${i+1}</div><div>${n.title}</div></li>`).join('');
}

function renderTicker(news) {
  const titles = news.map(n => n.title).slice(0,6);
  document.getElementById('tickerContent').innerHTML = [...titles, ...titles].join(' &nbsp;&nbsp;—&nbsp;&nbsp; ');
}

// ========== INTERACCIONES ==========
async function likeArticle(id) {
  await fetch(`${API_BASE}/api/like`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ news_id: id, user_token: userToken })
  });
  const res = await fetch(`${API_BASE}/api/likes/${id}`);
  const data = await res.json();
  document.getElementById(`likes_${id}`).innerText = data.count;
  showToast('👍 Like guardado');
}

async function saveForLater(id) {
  await fetch(`${API_BASE}/api/readlater`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ news_id: id, user_token: userToken })
  });
  showToast('📌 Guardado para después');
}

function shareArticle(id) {
  const item = allNews.find(n => n.id == id);
  if (navigator.share) {
    navigator.share({ title: item.title, text: item.excerpt, url: window.location.href });
  } else {
    navigator.clipboard.writeText(`${item.title} - ${item.excerpt}`);
    showToast('📋 Enlace copiado');
  }
}

// ========== MODAL ==========
let currentModalId = null;
async function openArticle(id) {
  const item = allNews.find(n => n.id == id);
  if (!item) return;
  currentModalId = id;
  document.getElementById('modalCat').innerText = getCatLabel(item.category);
  document.getElementById('modalTitle').innerText = item.title;
  document.getElementById('modalImg').src = item.image_url || 'https://picsum.photos/600/300';
  document.getElementById('modalBody').innerHTML = `
    <div class="truth-detail" style="background:var(--paper-2); padding:12px; margin:16px 0;">
      <span class="truth-score ${getTruthClass(item.truth_score)}">${item.truth_label} ${item.truth_score}%</span>
      <ul>${(item.truth_factors || ['Fuente confiable']).map(f => `<li>✓ ${f}</li>`).join('')}</ul>
    </div>
    <div>${item.body}</div>
    <p><a href="${item.source_url || '#'}" target="_blank">Fuente: ${item.source}</a></p>
  `;
  const modal = document.getElementById('articleModal');
  modal.classList.add('open');
  document.getElementById('modalLikeBtn').onclick = () => likeArticle(id);
  document.getElementById('modalShareBtn').onclick = () => shareArticle(id);
}

function closeModal() { document.getElementById('articleModal').classList.remove('open'); }
function closeModalIfBg(e) { if (e.target === document.getElementById('articleModal')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ========== FILTROS ==========
function filterNews(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.news-item').forEach(el => {
    el.style.display = (cat === 'todos' || el.dataset.cat === cat) ? 'grid' : 'none';
  });
}

// ========== SUSCRIPCIÓN ==========
function selectPlan(el, plan) {
  document.querySelectorAll('.sub-plan').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedPlan = plan;
}
async function doSubscribe() {
  const name = document.getElementById('subName').value;
  const email = document.getElementById('subEmail').value;
  if (!email) { showToast('Email requerido'); return; }
  const res = await fetch(`${API_BASE}/api/subscribe`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, name, plan: selectedPlan })
  });
  if (res.ok) showToast(`✅ Suscrito al plan ${selectedPlan}`);
  else showToast('Error en suscripción');
}

// ========== PUBLICAR ARTÍCULO ==========
document.getElementById('artHasData').addEventListener('change', function() {
  document.getElementById('finDataSection').style.display = this.value === 'yes' ? 'block' : 'none';
});

async function saveArticle(status) {
  const title = document.getElementById('artTitle').value.trim();
  const category = document.getElementById('artCategory').value;
  const source = document.getElementById('artSource').value.trim();
  const excerpt = document.getElementById('artExcerpt').value.trim();
  const body = document.getElementById('artBody').value.trim();
  const image_url = document.getElementById('artImageUrl').value.trim() || `https://picsum.photos/400/200?random=${Date.now()}`;
  const source_url = document.getElementById('artUrl').value.trim() || '#';
  let chart_data = null;
  if (document.getElementById('artHasData').value === 'yes') {
    try { chart_data = JSON.parse(document.getElementById('artFinData').value); } catch(e) { showToast('JSON inválido'); return; }
  }
  if (!title || !category || !source || !excerpt || !body) {
    showToast('Completa todos los campos obligatorios');
    return;
  }
  const newArticle = {
    title, category, source, source_url, excerpt, body,
    is_financial: !!chart_data, chart_data, image_url,
    user_email: 'user@example.com'
  };
  const res = await fetch(`${API_BASE}/api/news`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(newArticle)
  });
  if (res.ok) {
    showToast('✅ Artículo publicado');
    fetchNews(); // Recargar noticias
    // Limpiar formulario
    document.getElementById('artTitle').value = '';
    document.getElementById('artSource').value = '';
    document.getElementById('artExcerpt').value = '';
    document.getElementById('artBody').value = '';
    document.getElementById('artImageUrl').value = '';
    document.getElementById('artUrl').value = '';
    document.getElementById('artHasData').value = 'no';
    document.getElementById('finDataSection').style.display = 'none';
  } else showToast('Error al publicar');
}

// ========== MODO OSCURO ==========
const darkToggle = document.getElementById('darkModeToggle');
darkToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
});
if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

// ========== NAVEGACIÓN ==========
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`sec-${name}`).classList.add('active');
  if (name === 'noticias') document.querySelectorAll('.nav-tab')[0].classList.add('active');
  else document.querySelectorAll('.nav-tab')[1].classList.add('active');
}

// ========== INICIALIZACIÓN ==========
document.getElementById('dateStrip').innerText = new Date().toLocaleDateString('es-MX', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
fetchNews();
</script>
